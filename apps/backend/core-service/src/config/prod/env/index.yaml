http:
  env: prod
  port: 8081
  prefix: core-service
  timeout: 5000
  retryCount: 3
  retryDelay: 500

swagger:
  title: 管理后台
  version: 1.0
  prefix: api-docs
  description: 管理后台接口文档

DBConnections:
  - enable: true
    options:
      name: CORE_SERVICE_MONGODB
      uri: ${CORE_SERVICE_MONGODB}

cors:
  allowedHeaders:
    - X-timestamp
    - Access-Token
    - Accept
    - Content-Type
    - X-Sign
    - x-locale
    - Locale
  origin:
    - https://pawhaven.work
  credentials: true
  optionsSuccessStatus: 204
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
auth:
  jwtSecret: ${JWT_SECRET}
  jwtExpiresIn: 1800
