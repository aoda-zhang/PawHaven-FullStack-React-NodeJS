name: Deploy Pipeline
run-name: Deploy ${{ inputs.service }} to Vercel (${{ inputs.target }})

on:
  workflow_dispatch:
    inputs:
      service:
        description: App service to deploy
        required: true
        type: choice
        options:
          - portal
          - admin
          - gateway
          - core-service
          - auth-service
          - document-service
      target:
        description: Vercel deployment target
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target == 'production' && 'production' || 'preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app service config
        id: config
        uses: ./.github/actions/service-resolver
        with:
          service: ${{ inputs.service }}
          gateway_project_id: ${{ secrets.VERCEL_PROJECT_ID_GATEWAY }}
          core_service_project_id: ${{ secrets.VERCEL_PROJECT_ID_CORE_SERVICE }}
          auth_service_project_id: ${{ secrets.VERCEL_PROJECT_ID_AUTH_SERVICE }}
          document_service_project_id: ${{ secrets.VERCEL_PROJECT_ID_DOCUMENT_SERVICE }}
          portal_project_id: ${{ secrets.VERCEL_PROJECT_ID_PORTAL }}
          admin_project_id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

      - name: Install and build package
        uses: ./.github/actions/install-build
        with:
          build_filter: ${{ steps.config.outputs.build_filter }}

      - name: Deploy to Vercel
        uses: ./.github/actions/vercel-deploy
        with:
          service_path: ${{ steps.config.outputs.service_path }}
          vercel_project_id: ${{ steps.config.outputs.vercel_project_id }}
          target: ${{ inputs.target }}
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
