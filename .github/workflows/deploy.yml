name: Deploy Pipeline
run-name: Deploy ${{ inputs.service }} to Vercel (preview -> production)

on:
  workflow_dispatch:
    inputs:
      service:
        description: App service to deploy
        required: true
        type: choice
        options:
          - portal
          - admin
          - gateway
          - core-service
          - auth-service
          - document-service
permissions:
  contents: read

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets for selected service
        env:
          SERVICE: ${{ inputs.service }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_GATEWAY: ${{ secrets.VERCEL_PROJECT_ID_GATEWAY }}
          VERCEL_PROJECT_ID_CORE_SERVICE: ${{ secrets.VERCEL_PROJECT_ID_CORE_SERVICE }}
          VERCEL_PROJECT_ID_AUTH_SERVICE: ${{ secrets.VERCEL_PROJECT_ID_AUTH_SERVICE }}
          VERCEL_PROJECT_ID_DOCUMENT_SERVICE: ${{ secrets.VERCEL_PROJECT_ID_DOCUMENT_SERVICE }}
          VERCEL_PROJECT_ID_PORTAL: ${{ secrets.VERCEL_PROJECT_ID_PORTAL }}
          VERCEL_PROJECT_ID_ADMIN: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        shell: bash
        run: |
          set -euo pipefail

          require_secret() {
            local value="$1"
            local name="$2"
            if [[ -z "${value}" ]]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          }

          require_secret "${VERCEL_TOKEN}" "VERCEL_TOKEN"
          require_secret "${VERCEL_ORG_ID}" "VERCEL_ORG_ID"

          case "${SERVICE}" in
            gateway)
              require_secret "${VERCEL_PROJECT_ID_GATEWAY}" "VERCEL_PROJECT_ID_GATEWAY"
              ;;
            core-service)
              require_secret "${VERCEL_PROJECT_ID_CORE_SERVICE}" "VERCEL_PROJECT_ID_CORE_SERVICE"
              ;;
            auth-service)
              require_secret "${VERCEL_PROJECT_ID_AUTH_SERVICE}" "VERCEL_PROJECT_ID_AUTH_SERVICE"
              ;;
            document-service)
              require_secret "${VERCEL_PROJECT_ID_DOCUMENT_SERVICE}" "VERCEL_PROJECT_ID_DOCUMENT_SERVICE"
              ;;
            portal)
              require_secret "${VERCEL_PROJECT_ID_PORTAL}" "VERCEL_PROJECT_ID_PORTAL"
              ;;
            admin)
              require_secret "${VERCEL_PROJECT_ID_ADMIN}" "VERCEL_PROJECT_ID_ADMIN"
              ;;
            *)
              echo "Unsupported service: ${SERVICE}" >&2
              exit 1
              ;;
          esac

  resolve:
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      service_path: ${{ steps.config.outputs.service_path }}
      build_filter: ${{ steps.config.outputs.build_filter }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app service config
        id: config
        uses: ./.github/actions/service-resolver
        with:
          service: ${{ inputs.service }}

  install_build:
    name: Install And Build
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and build package
        uses: ./.github/actions/install-build
        with:
          build_filter: ${{ needs.resolve.outputs.build_filter }}

  deploy_preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [resolve, install_build]
    environment:
      name: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy preview to Vercel
        uses: ./.github/actions/vercel-deploy
        with:
          service: ${{ inputs.service }}
          service_path: ${{ needs.resolve.outputs.service_path }}
          gateway_project_id: ${{ secrets.VERCEL_PROJECT_ID_GATEWAY }}
          core_service_project_id: ${{ secrets.VERCEL_PROJECT_ID_CORE_SERVICE }}
          auth_service_project_id: ${{ secrets.VERCEL_PROJECT_ID_AUTH_SERVICE }}
          document_service_project_id: ${{ secrets.VERCEL_PROJECT_ID_DOCUMENT_SERVICE }}
          portal_project_id: ${{ secrets.VERCEL_PROJECT_ID_PORTAL }}
          admin_project_id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          target: preview
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [resolve, install_build, deploy_preview]
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy production to Vercel
        uses: ./.github/actions/vercel-deploy
        with:
          service: ${{ inputs.service }}
          service_path: ${{ needs.resolve.outputs.service_path }}
          gateway_project_id: ${{ secrets.VERCEL_PROJECT_ID_GATEWAY }}
          core_service_project_id: ${{ secrets.VERCEL_PROJECT_ID_CORE_SERVICE }}
          auth_service_project_id: ${{ secrets.VERCEL_PROJECT_ID_AUTH_SERVICE }}
          document_service_project_id: ${{ secrets.VERCEL_PROJECT_ID_DOCUMENT_SERVICE }}
          portal_project_id: ${{ secrets.VERCEL_PROJECT_ID_PORTAL }}
          admin_project_id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          target: production
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
