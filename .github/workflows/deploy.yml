name: Deploy Pipeline
run-name: Deploy ${{ inputs.service }} to Vercel (preview -> production)

on:
  workflow_dispatch:
    inputs:
      service:
        description: App service to deploy
        required: true
        type: choice
        options:
          - portal
          - admin
          - gateway
          - core-service
          - auth-service
          - document-service
permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      service_path: ${{ steps.config.outputs.service_path }}
      build_filter: ${{ steps.config.outputs.build_filter }}
      project_secret_name: ${{ steps.config.outputs.project_secret_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app service config
        id: config
        uses: ./.github/actions/service-resolver
        with:
          service: ${{ inputs.service }}

  install_build:
    name: Install And Build
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and build package
        uses: ./.github/actions/install-build
        with:
          build_filter: ${{ needs.resolve.outputs.build_filter }}

  deploy_preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [resolve, install_build]
    environment:
      name: preview
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[needs.resolve.outputs.project_secret_name] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy preview to Vercel
        uses: ./.github/actions/vercel-deploy
        with:
          service_path: ${{ needs.resolve.outputs.service_path }}
          target: preview

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [resolve, install_build, deploy_preview]
    environment:
      name: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[needs.resolve.outputs.project_secret_name] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy production to Vercel
        uses: ./.github/actions/vercel-deploy
        with:
          service_path: ${{ needs.resolve.outputs.service_path }}
          target: production
