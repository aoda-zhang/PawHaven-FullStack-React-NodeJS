name: Vercel Deploy
description: Deploy an app service to Vercel

inputs:
  service_path:
    description: Relative path to service root for vercel --cwd
    required: true
  target:
    description: Deploy target (preview|production)
    required: true
  node_version:
    description: Node.js version
    required: false
    default: '24'

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ inputs.target }}" != "preview" && "${{ inputs.target }}" != "production" ]]; then
          echo "target must be preview or production" >&2
          exit 1
        fi
        if [[ -z "${{ inputs.service_path }}" ]]; then
          echo "service_path is required" >&2
          exit 1
        fi

    - name: Validate Vercel secrets
      shell: bash
      env:
        VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
      run: |
        set -euo pipefail

        ensure_required() {
          local value="$1"
          local name="$2"
          if [[ -z "${value}" ]]; then
            echo "Missing required secret: ${name}" >&2
            exit 1
          fi
        }

        ensure_required "${VERCEL_TOKEN}" "VERCEL_TOKEN"
        ensure_required "${VERCEL_ORG_ID}" "VERCEL_ORG_ID"
        ensure_required "${VERCEL_PROJECT_ID}" "VERCEL_PROJECT_ID_* for selected service"

    - name: Install Vercel CLI
      shell: bash
      run: npm i -g vercel@latest

    - name: Resolve deploy path
      id: resolve_path
      shell: bash
      run: |
        set -euo pipefail
        SERVICE_CWD="${GITHUB_WORKSPACE}/${{ inputs.service_path }}"
        if [[ ! -d "${SERVICE_CWD}" ]]; then
          echo "Resolved service path not found: ${SERVICE_CWD}" >&2
          exit 1
        fi
        echo "deploy_cwd=${GITHUB_WORKSPACE}" >> "$GITHUB_OUTPUT"

    - name: Pull Vercel project settings
      shell: bash
      env:
        VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
      run: |
        vercel pull \
          --yes \
          --environment="${{ inputs.target }}" \
          --token="${VERCEL_TOKEN}" \
          --cwd="${{ steps.resolve_path.outputs.deploy_cwd }}"

    - name: Deploy preview
      if: ${{ inputs.target == 'preview' }}
      shell: bash
      env:
        VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
      run: |
        vercel deploy \
          --yes \
          --token="${VERCEL_TOKEN}" \
          --cwd="${{ steps.resolve_path.outputs.deploy_cwd }}"

    - name: Deploy production
      if: ${{ inputs.target == 'production' }}
      shell: bash
      env:
        VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
      run: |
        vercel deploy \
          --prod \
          --yes \
          --token="${VERCEL_TOKEN}" \
          --cwd="${{ steps.resolve_path.outputs.deploy_cwd }}"
